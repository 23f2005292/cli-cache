name: CI with Cache

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache-demo
          key: cache-447feb9

      - name: prime-cache-447feb9
        run: |
          if [ "${{ steps.cache-deps.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit!"
          else
            echo "Cache miss!"
          fi

      - name: Create cache content
        run: |
          mkdir -p ~/.cache-demo
          echo "Priming cache" > ~/.cache-demo/file.txt
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: cache-447feb9

      - name: prime-cache-447feb9
        run: |
          if [ "${{ steps.cache-deps.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit!"
          else
            echo "Cache miss!"
          fi

      - name: Install dependencies
        run: npm install
